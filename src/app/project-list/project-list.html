<div class="project-scroll">

  <div class="project-card" *ngFor="let project of projects">

    <div class="project-inner shadow-lg p-3 bg-body-tertiary rounded">

      <img [src]="project.image" class="project-img" alt="{{project.title}}">

      <div class="card-body d-flex flex-column">

        <h5 class="card-title mb-2">{{ project.title }}</h5>

        <ul class="card-text" style="text-align: left; padding-left: 20px;">
          @for(line of project.descriptionLines; track line; let i = $index){
            @if(i < 1){
              <li>{{line}}</li>
            }
          }
        </ul>

        <button class="btn btn-primary mt-auto"
        (click)="openProject(project)">
          View More
        </button>

      </div>

    </div>

  </div>

</div>
<div class="project-modal" *ngIf="selectedProject">

  <div class="modal-content"
       (click)="$event.stopPropagation()">

    <span class="close-btn" (click)="closeProject()">×</span>

    <img [src]="selectedProject.image" class="modal-img">

    <h3>{{selectedProject.title}}</h3>

    <ul class="card-text" style="text-align: left; padding-left: 20px;">
      @for(line of selectedProject.descriptionLines; track line){
      <li>{{line}}</li>
      }
    </ul>

  </div>

</div>
